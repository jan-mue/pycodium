id: remove-pytest-asyncio-mark
language: python
message: Remove @pytest.mark.asyncio when asyncio_mode=auto
severity: error
rule:
  all:
    - kind: decorator
    - has:
        pattern: pytest.mark.asyncio
        stopBy: end
    - precedes:
        stopBy: end
        any:
          - pattern:
              context: |
                async def $NAME($$$ARGS):
                  $$$BODY
              selector: function_definition
          - pattern:
              context: |
                async def $NAME($$$ARGS) -> $RET:
                  $$$BODY
              selector: function_definition
        has:
          field: name
          regex: ^test_
fix:
  template: ''
