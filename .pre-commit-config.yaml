repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 2700fd5671c633760d912769c041bfcde2b9a01b # frozen: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/codespell-project/codespell
    rev: 57b21406f092110c18776e39b0bda50d37c945c8 # frozen: v2.4.3
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
        args: [--write-changes]
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 6b63472e72e1a91ed8a2f6d483790dfb644fa1d3 # frozen: 0.37.4
    hooks:
      - id: check-renovate
  - repo: https://github.com/google/yamlfmt
    rev: 21ca5323a9c87ee37a434e0ca908efc0a89daa07 # frozen: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: 3632ea90e7641b574983ddf3a11ccedefff3c881 # frozen: v2.25.3
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 534166213006ec869b773b7ed8c6ebeaad1165d0 # frozen: v0.23.0
    hooks:
      - id: markdownlint-cli2
        args: [--fix]
        exclude: CHANGELOG\.md|\.agents/
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: b7359babf83a050dcd7bf892538f3df09c3d4ba6 # frozen: 0.11.29
    hooks:
      - id: uv-lock
  - repo: https://github.com/fpgmaas/deptry.git
    rev: 0c39226d761685125c5ff71ca81282d6751c9540 # frozen: 0.25.1
    hooks:
      - id: deptry
        entry: uv run --locked deptry .
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 64a97fb7fa63188393d3215c6e312f5f9c6d0f78 # frozen: v1.27.0
    hooks:
      - id: zizmor
  - repo: local
    hooks:
      - id: ast-grep
        name: ast-grep lint
        language: python
        entry: sg scan --color=never --update-all --report-style=short
        types: [python]
        additional_dependencies:
          - ast-grep-cli==0.44.1
      - id: pyproject-pinned-deps
        name: Check pyproject dependencies are pinned
        language: pygrep
        files: '(^|/)pyproject\.toml$'
        entry: '^\s*"[^"]+\s*(>=|<=|~=|!=|<|>|==[^"]*\*)'
      - id: forbid-ble001-ignore
        name: Forbid explicit BLE001 ignores
        language: pygrep
        types: [python]
        entry: '#\s*(?:noqa|ruff:\s*noqa):\s*[^#\n]*\bBLE001\b'
